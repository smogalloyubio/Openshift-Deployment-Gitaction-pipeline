
name: OpenShift CI/CD Pipeline (Secure 3-Stage)

on:
  push:
    branches: [main]

env:
  APP_NAME: openshift-app
  IMAGE_TAG: latest
  NAMESPACE: ubiowororuki-dev

  QUAY_USERNAME: ubiowororuki
  QUAY_IMAGE: quay.io/ubiowororuki/openshift-app:latest
  DOCKER_IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/openshift-app:latest

jobs:


  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy FS Scan (Source Code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: ecommerce-app
          severity: HIGH,CRITICAL
          exit-code: 1



  build:
    runs-on: ubuntu-latest
    needs: scan


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

     
      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ecommerce-app/package-lock.json

    
      - name: Install dependencies
        working-directory: ecommerce-app
        run: npm ci

    
      - name: Build React App
        working-directory: ecommerce-app
        run: npm run build

  
      - name: Ensure lucide-react exists
        working-directory: ecommerce-app
        run: npm install lucide-react 


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

    
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.ROBOT_USERNAME }}   
          password: ${{ secrets.ROBOT_TOKEN }}

    
      - name: Build Image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-app
          file: ecommerce-app/Dockerfile
          load: true
          tags: ${{ env.QUAY_IMAGE }}



      - name: Build Image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-app
          file: ecommerce-app/Dockerfile
          load: true
          tags: ${{ env.DOCKER_IMAGE }}

    
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.QUAY_IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: 1


      - name: Trivy Image Scan docker image 
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: 1

  
      - name: Push Image to Registries
        run: |
          docker tag ${{ env.QUAY_IMAGE }} quay.io/${{ env.QUAY_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.DOCKER_IMAGE }} docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

          docker push quay.io/${{ env.QUAY_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker push docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}



  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ env.NAMESPACE }}
          insecure_skip_tls_verify: true

     
      - name: Apply Kubernetes Manifests
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/routes.yaml

      - name: Update Deployment Image
        run: |
          oc set image deployment/${{ env.APP_NAME }} \
          ${{ env.APP_NAME }}=${{ env.QUAY_IMAGE }}

   
      - name: Rollout Status
        run: |
          oc rollout status deployment/${{ env.APP_NAME }}

      - name: Verify Application Route
        run: |
         oc get  pods -o wide 
         echo "Application should be accessible via the route created in OpenShift"
          