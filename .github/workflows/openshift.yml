name: OpenShift CI/CD

on:
  push:
    branches: [main]

env:
  OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
  OPENSHIFT_NAMESPACE: ubiowororuki-dev

  APP_NAME: openshift-app
  IMAGE_TAG: latest   
  IMAGE_REGISTRY: quay.io
  IMAGE_NAMESPACE: ubiowororuki  

  QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
  QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}


  

jobs:

  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ecommerce-app/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('ecommerce-app/package-lock.json') }}

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: ecommerce-app
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1


      - name: set the image name 
        run: |
          echo "IMAGE_FULL=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV


  build-deploy:
    runs-on: ubuntu-latest
    needs: scan

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Debug Image Name
        run: |
          echo "IMAGE_FULL=${{ env.IMAGE_FULL }}"


      - name: Build container image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}
          tags: ${{ env.IMAGE_TAG }}
          context: ecommerce-app
          dockerfiles: ecommerce-app/Dockerfile
          layers: true


      - name: Tag image for Quay
        run: |
          buildah tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"


      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ env.QUAY_USERNAME }}
          password: ${{ env.QUAY_TOKEN }}

  
      - name: Push image to Quay
        run: |
          buildah push ${{ env.IMAGE_FULL }}

  
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FULL }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

   
      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ env.OPENSHIFT_SERVER }}
          openshift_token: ${{ env.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.OPENSHIFT_NAMESPACE }}


      - name: Apply OpenShift resources
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml


      - name: Update Deployment image
        run: |
          oc set image deployment/${{ env.APP_NAME }} \
          ${{ env.APP_NAME }}=${{ env.IMAGE_FULL }}


      - name: Rollout status
        run: |
          oc rollout status deployment/${{ env.APP_NAME }}


      - name: Route URL
        run: |
          echo "App URL:"
          oc get route ${{ env.APP_NAME }} -o jsonpath='{.spec.host}'