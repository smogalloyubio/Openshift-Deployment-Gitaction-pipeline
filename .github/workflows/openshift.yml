name: OpenShift CI/CD Pipeline (3-Stage)

on:
  push:
    branches: [main]

env:
  APP_NAME: openshift-app
  IMAGE_TAG: latest
  NAMESPACE: ubiowororuki-dev

  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
  QUAY_IMAGE: quay.io/ubiowororuki/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

jobs:

# ==================================================
# 🔵 STAGE 1 - SECURITY SCAN
# ==================================================
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: ecommerce-app
          severity: HIGH,CRITICAL
          exit-code: 1


# ==================================================
# 🟢 STAGE 2 - BUILD + PUSH (DOCKER + QUAY)
# ==================================================
  build:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------
      # LOGIN DOCKER HUB
      # -------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # LOGIN QUAY
      # -------------------------
      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      # -------------------------
      # BUILD IMAGE
      # -------------------------
      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-app
          file: ecommerce-app/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}
            ${{ env.QUAY_IMAGE }}

      # -------------------------
      # PUSH IMAGE TO BOTH REGISTRIES
      # -------------------------
      - name: Push Images
        run: |
          docker push ${{ env.DOCKER_IMAGE }}
          docker push ${{ env.QUAY_IMAGE }}


# ==================================================
# 🔴 STAGE 3 - DEPLOY TO OPENSHIFT
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # INSTALL OC CLI
      # -------------------------
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      # -------------------------
      # LOGIN OPENSHIFT
      # -------------------------
      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ env.NAMESPACE }}
          insecure_skip_tls_verify: true

      # -------------------------
      # APPLY MANIFESTS
      # -------------------------
      - name: Deploy Resources
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml

      # -------------------------
      # UPDATE IMAGE (QUAY)
      # -------------------------
      - name: Update Deployment Image
        run: |
          oc set image deployment/${APP_NAME} \
          ${APP_NAME}=${QUAY_IMAGE}

      # -------------------------
      # ROLLOUT STATUS
      # -------------------------
      - name: Rollout Status
        run: |
          oc rollout status deployment/${APP_NAME}

      # -------------------------
      # APP URL
      # -------------------------
      - name: Get Route
        run: |
          echo "Application URL:"
          oc get route ${APP_NAME} -o jsonpath='{.spec.host}'