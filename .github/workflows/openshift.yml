name: OpenShift CI/CD

on:
  push:
    branches: [main]

env:
  OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
  OPENSHIFT_NAMESPACE: ubiowororuki-dev

  APP_NAME: openshift-app
  IMAGE_TAG: latest   

  IMAGE_REGISTRY: quay.io/${{ secrets.QUAY_USERNAME }}
  IMAGE_REGISTRY_USER: ${{ secrets.QUAY_USERNAME }}
  IMAGE_REGISTRY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ecommerce-app/node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('ecommerce-app/package-lock.json') }}

    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        path: ecommerce-app
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1


  build_docker_image:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
    - name: checkout code
      uses: actions/checkout@v4


    - name: Build container image
      id: build
      uses: redhat-actions/buildah-build@v2
      with:
        image: ${{ env.APP_NAME }}
        tags: ${{ env.IMAGE_TAG }}
        context: ecommerce-app
        dockerfiles: ecommerce-app/Dockerfile
        layers: true

    - name: Tag image for Quay
      run: |
        buildah tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} \
        ${{ env.IMAGE_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

    - name: Trivy Image Scan (before push)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1

    - name: Login to Quay
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Push image to Quay
      run: |
        buildah push ${{ env.IMAGE_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

    - name: Install oc CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: 4

    - name: Login to OpenShift
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server_url: ${{ env.OPENSHIFT_SERVER }}
        openshift_token: ${{ env.OPENSHIFT_TOKEN }}
        insecure_skip_tls_verify: true
        namespace: ${{ env.OPENSHIFT_NAMESPACE }}

    - name: Update Deployment image
      run: |
        oc set image deployment/${{ env.APP_NAME }} \
        ${{ env.APP_NAME }}=${{ env.IMAGE_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

    - name: Apply OpenShift resources
      run: |
        oc apply -f openshift/deployment.yaml
        oc apply -f openshift/service.yaml
        oc apply -f openshift/route.yaml

    - name: Rollout status
      run: |
        oc rollout status deployment/${{ env.APP_NAME }}

    - name: Route URL
      run: |
        oc get route ${{ env.APP_NAME }} -o jsonpath='{.spec.host}'
