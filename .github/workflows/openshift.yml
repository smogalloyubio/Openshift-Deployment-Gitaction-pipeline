name: OpenShift CI/CD

on:
  push:
    branches: [main]

env:
  OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
  OPENSHIFT_NAMESPACE: ubiowororuki-dev

  APP_NAME: openshift-app
  IMAGE_TAG: latest

  IMAGE_REGISTRY: quay.io
  IMAGE_NAMESPACE: ubiowororuki


  QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}   # e.g. ubiowororuki+ubio
  QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

  IMAGE_FULL: quay.io/ubiowororuki/openshift-app:latest


jobs:

# -----------------------
# CODE SCAN
# -----------------------
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: ecommerce-app
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1


# -----------------------
# BUILD + DEPLOY
# -----------------------
  build-deploy:
    runs-on: ubuntu-latest
    needs: scan

    steps:

# -----------------------
# Checkout
# -----------------------
      - name: Checkout code
        uses: actions/checkout@v4


# -----------------------
# Build Image
# -----------------------
      - name: Build container image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}
          tags: ${{ env.IMAGE_TAG }}
          context: ecommerce-app
          dockerfiles: ecommerce-app/Dockerfile
          layers: true


# -----------------------
# Tag Image
# -----------------------
      - name: Tag image for Quay
        run: |
          buildah tag \
            ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.IMAGE_FULL }}


# -----------------------
# LOGIN TO QUAY (CRITICAL FIX)
# -----------------------
      - name: Login to Quay (Buildah) - VERIFY ROBOT
        run: |
          echo "Logging in to Quay as: ${{ env.QUAY_USERNAME }}"

          echo "${{ env.QUAY_TOKEN }}" | buildah login quay.io \
            -u "${{ env.QUAY_USERNAME }}" \
            --password-stdin

          echo "Login successful ✔"


# -----------------------
# PUSH IMAGE
# -----------------------
      - name: Push image to Quay
        run: |
          echo "Pushing image: ${{ env.IMAGE_FULL }}"
          buildah push ${{ env.IMAGE_FULL }}


# -----------------------
# IMAGE SCAN
# -----------------------
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FULL }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1


# -----------------------
# OPENSHIFT LOGIN
# -----------------------
      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4


      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ env.OPENSHIFT_SERVER }}
          openshift_token: ${{ env.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.OPENSHIFT_NAMESPACE }}


# -----------------------
# DEPLOY
# -----------------------
      - name: Apply OpenShift resources
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml


      - name: Update Deployment image
        run: |
          oc set image deployment/${{ env.APP_NAME }} \
            ${{ env.APP_NAME }}=${{ env.IMAGE_FULL }}


      - name: Rollout status
        run: |
          oc rollout status deployment/${{ env.APP_NAME }}


      - name: Route URL
        run: |
          echo "Application URL:"
          oc get route ${{ env.APP_NAME }} -o jsonpath='{.spec.host}'